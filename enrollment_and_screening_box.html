        const update = { id: item.id };
        if (!colorSame) update.color = targetColor;
        if (!fontSame) {
          const newFont = Object.assign({}, fontObj);
          if (targetFontColor) newFont.color = targetFontColor;
          else delete newFont.color;
          update.font = newFont;
        }
        updates.push(update);
      }
    });

    // Always restore base colors for selected/focus nodes to avoid accidental dimming.
    const keepSet = new Set([...focusSet, ...selectedSet]);
    keepSet.forEach(function(id) {
      const item = nodes.get(id);
      if (!item) return;
      const baseColor = originalColors.get(id) ?? item.color;
      const fontObj = (typeof item.font === "object" && item.font) ? item.font : {};
      const baseFontColor = originalFontColors.get(id) ?? BASE_FONT_COLOR_FALLBACK;
      updates.push({
        id,
        color: baseColor,
        font: Object.assign({}, fontObj, { color: baseFontColor })
      });
    });

    lastHighlightNodes = hasFocus ? Array.from(focusSet) : [];
    if (updates.length) nodes.update(updates);
  }

  function ensureNodeVisible(id) {
    if (!id) return false;
    const updates = [];

    // Reveal the target and its ancestors.
    let curr = id;
    const seenAnc = new Set();
    while (curr && !seenAnc.has(curr)) {
      seenAnc.add(curr);
      const item = nodes.get(curr);
      if (item && item.hidden === true) {
        updates.push({ id: curr, hidden: false });
      }
      curr = parentMap.get(curr);
    }

    // Reveal prerequisite nodes (logic sources) for context — skip calc nodes.
    prereqsOf(id).forEach(function(src) {
      if (typeof src === 'string' && src.startsWith('C')) return;
      const srcItem = nodes.get(src);
      if (srcItem && srcItem.hidden === true) {

      }
    });

    if (updates.length) nodes.update(updates);
    return true;

  function activateNode(id, fromButton) {

  function renderTopLayer(ctx) {
    const hinted = (typeof window !== 'undefined' && window.__hintedNodes && Array.isArray(window.__hintedNodes))
      ? window.__hintedNodes
      : [];
    const baseSet = lastHighlightNodes || [];
    const selected = network.getSelectedNodes ? network.getSelectedNodes() : [];
    const topNodes = baseSet.concat(selected || [], hinted || []);
    const body = network.body;
    const nodesToRedraw = new Set(topNodes);
    const selectedSet = new Set(selected || []);

    // Collect edges touching the selected node, split by type.
    const solidEdges = [];  // flow edges — drawn first (bottom of overlay)
    const dashedEdges = []; // logic edges — drawn second (top of overlay)

    edges.forEach(function(e) {
      if (!e || e.id == null) return;
      var dataEdge = edges.get(e.id);
      if (dataEdge && dataEdge.hidden === true) return;

      var isDashed = (e.dashes === true) || (e.data_kind === 'logic');
      var isFlow = (e.data_kind === 'flow');
      var edgeObj = body && body.edges ? body.edges[e.id] : null;
      var isHighlighted = !!(edgeObj && (edgeObj.selected === true || edgeObj.hover === true));
      var touchesSelected = selectedSet.has(e.from) || selectedSet.has(e.to);

      if (!isHighlighted && !touchesSelected) return;
      if (!isDashed && !isFlow) return;

      nodesToRedraw.add(e.from);
      nodesToRedraw.add(e.to);
      if (isDashed) {
        dashedEdges.push(e.id);
      } else {
        solidEdges.push(e.id);
      }
    });

    if (!solidEdges.length && !dashedEdges.length && !nodesToRedraw.size) return;
    try {
      // Layer 1: redraw solid (flow) edges
      solidEdges.forEach(function(eid) {
        var edge = body && body.edges ? body.edges[eid] : null;
        if (edge && edge.draw) edge.draw(ctx);
      });
      // Layer 2: redraw dashed (logic) edges on top of solid
      dashedEdges.forEach(function(eid) {
        var edge = body && body.edges ? body.edges[eid] : null;
        if (edge && edge.draw) edge.draw(ctx);
      });
      // Layer 3: redraw nodes on top of all edges
      nodesToRedraw.forEach(function(id) {
        var node = body && body.nodes ? body.nodes[id] : null;
        if (node && node.draw) node.draw(ctx);
      });
    } catch (e) {}
  }

  network.on("afterDrawing", function(ctx) {
    renderTopLayer(ctx);
  });

  // Freeze physics once stabilized to stop jittering after initial layout
  if (!canReuseLayout) {
    network.once("stabilized", function () {
      captureLayoutToCache(layoutCacheKey);
      network.setOptions({ physics: false });
    });
  } else {
    network.setOptions({ physics: false });
    if (network.stopSimulation) network.stopSimulation();
  }
})();

  var flowVisible = false;

  var logicEdgeIds = [];
  var flowEdgeIds = [];
  edges.forEach(function(e) {
    if (!e || e.id == null) return;
    if (e.data_kind === 'logic') logicEdgeIds.push(e.id);
    else if (e.data_kind === 'flow') flowEdgeIds.push(e.id);
  });

  // Build map: nodeId -> list of connected flow edge IDs
  var flowEdgesByNode = {};
  edges.forEach(function(e) {
    if (!e || e.id == null || e.data_kind !== 'flow') return;
    var f = String(e.from), t = String(e.to);
    if (!flowEdgesByNode[f]) flowEdgesByNode[f] = [];
    flowEdgesByNode[f].push(e.id);
    if (!flowEdgesByNode[t]) flowEdgesByNode[t] = [];
    flowEdgesByNode[t].push(e.id);
  });

  var selectionRevealedFlowIds = [];

  function setEdgesHidden(ids, hidden) {
    if (!ids.length) return;
    edges.update(ids.map(function(id) { return { id: id, hidden: hidden }; }));
  }

  // Re-insert visible logic edges at the end of the DataSet so vis.js draws them last (on top).
  function bumpLogicEdgesOnTop() {
    var visible = [];
    logicEdgeIds.forEach(function(id) {
      var e = edges.get(id);
      if (e && e.hidden !== true) visible.push(e);
    });
    if (!visible.length) return;
    var removeIds = visible.map(function(e) { return e.id; });
    edges.remove(removeIds);
    edges.add(visible);
  }

  function revealFlowForNode(nodeId) {
    // Hide previously revealed selection edges (unless global toggle is on)
    clearSelectionFlow();
    if (flowVisible) return; // global toggle already shows all
    var ids = flowEdgesByNode[String(nodeId)] || [];
    if (!ids.length) return;
    setEdgesHidden(ids, false);
    selectionRevealedFlowIds = ids.slice();
    // Ensure dashed edges stay on top of newly shown solid edges
    bumpLogicEdgesOnTop();
  }

  function clearSelectionFlow() {
    if (flowVisible) { selectionRevealedFlowIds = []; return; }
    if (selectionRevealedFlowIds.length) {
      setEdgesHidden(selectionRevealedFlowIds, true);
      selectionRevealedFlowIds = [];
    }
  }

  // Hide both edge types on load
  setEdgesHidden(logicEdgeIds, true);
  setEdgesHidden(flowEdgeIds, true);

  // Hide calculation nodes on load (JS-side ensures this regardless of serialized state)
  var calcNodeIds = [];
  nodes.forEach(function(n) {
    if (n && typeof n.id === 'string' && n.id.startsWith('C')) calcNodeIds.push(n.id);
  });
  if (calcNodeIds.length) {
    nodes.update(calcNodeIds.map(function(id) { return { id: id, hidden: true }; }));
  }

  // Show connected flow edges on node selection
  network.on('selectNode', function(params) {
    var sel = (params && params.nodes) ? params.nodes : [];
    if (sel.length === 1) revealFlowForNode(sel[0]);
  });
  network.on('deselectNode', function() {
    clearSelectionFlow();
  });
  network.on('click', function(params) {
    var sel = (params && params.nodes) ? params.nodes : [];
    if (sel.length === 1) {
      revealFlowForNode(sel[0]);
    } else if (!sel.length) {
      clearSelectionFlow();
    }
  });

  function addButtons() {
    var panel = null;
    var divs = document.querySelectorAll('div');
    for (var i = 0; i < divs.length; i++) {
      var el = divs[i];
      if (el.style && el.style.position === 'absolute' && el.textContent && el.textContent.indexOf('Display mode:') !== -1) {
        panel = el;
        break;
      }
    }
    if (!panel) return false;

    // Find the Legend title so we can insert before it
    var legendTitle = null;
    var children = panel.querySelectorAll('div');
    for (var j = 0; j < children.length; j++) {
      if ((children[j].textContent || '').trim() === 'Legend:') {
        legendTitle = children[j];
        break;
      }
    }

    var wrapper = document.createElement('div');

    var title = document.createElement('div');
    title.textContent = 'Lines display:';
    title.style.margin = '8px 0 4px 0';
    title.style.fontWeight = '600';
    wrapper.appendChild(title);

    function makeBtn(label) {
      var btn = document.createElement('button');
      btn.textContent = label;
      btn.style.display = 'block';
      btn.style.width = '100%';
      btn.style.margin = '0 0 4px 0';
      btn.style.padding = '4px 8px';
      btn.style.fontSize = '12px';
      btn.style.border = '1px solid #ccc';
      btn.style.borderRadius = '4px';
      btn.style.background = '#f9f9f9';
      btn.style.cursor = 'pointer';
      return btn;
    }

    var condBtn = makeBtn('Show conditions');
    condBtn.onclick = function() {
      logicVisible = !logicVisible;
      setEdgesHidden(logicEdgeIds, !logicVisible);
      condBtn.textContent = logicVisible ? 'Hide conditions' : 'Show conditions';
      condBtn.style.background = logicVisible ? '#e6f4ff' : '#f9f9f9';
      condBtn.style.borderColor = logicVisible ? '#4b5563' : '#ccc';
      try { network.redraw(); } catch(e) {}
    };
    wrapper.appendChild(condBtn);

    var flowBtn = makeBtn('Show question order');
    flowBtn.onclick = function() {
      flowVisible = !flowVisible;
      selectionRevealedFlowIds = [];
      setEdgesHidden(flowEdgeIds, !flowVisible);
      // Keep dashed edges on top when solid edges become visible
      if (flowVisible) bumpLogicEdgesOnTop();
      flowBtn.textContent = flowVisible ? 'Hide question order' : 'Show question order';
      flowBtn.style.background = flowVisible ? '#e6f4ff' : '#f9f9f9';
      flowBtn.style.borderColor = flowVisible ? '#4b5563' : '#ccc';
      try { network.redraw(); } catch(e) {}
    };
    wrapper.appendChild(flowBtn);

    var calcVisible = false;
    var calcRevealedLogicIds = [];
    var calcBtn = makeBtn('Show calculations');
    calcBtn.onclick = function() {
      calcVisible = !calcVisible;
      var nodeUpdates = [];
      nodes.forEach(function(n) {
        if (!n || typeof n.id !== 'string' || !n.id.startsWith('C')) return;
        nodeUpdates.push({ id: n.id, hidden: !calcVisible });
      });
      if (nodeUpdates.length) nodes.update(nodeUpdates);
      if (calcVisible) {
        calcRevealedLogicIds = [];
        edges.forEach(function(e) {
          if (!e || e.id == null || e.data_kind !== 'logic') return;
          if (e.hidden !== true) return;
          var from = String(e.from || ''), to = String(e.to || '');
          if (from.startsWith('C') || to.startsWith('C')) calcRevealedLogicIds.push(e.id);
        });
        setEdgesHidden(calcRevealedLogicIds, false);
      } else {
        if (calcRevealedLogicIds.length) {
          setEdgesHidden(calcRevealedLogicIds, true);
          calcRevealedLogicIds = [];
        }
      }
      calcBtn.textContent = calcVisible ? 'Hide calculations' : 'Show calculations';
      calcBtn.style.background = calcVisible ? '#e6f4ff' : '#f9f9f9';
      calcBtn.style.borderColor = calcVisible ? '#4b5563' : '#ccc';
      try { network.redraw(); } catch(e) {}
    };
    wrapper.appendChild(calcBtn);

    if (legendTitle) {
      panel.insertBefore(wrapper, legendTitle);
    } else {
      panel.appendChild(wrapper);
    }
    return true;
  }

  var attempts = 0;
  var timer = setInterval(function() {
    attempts++;
    if (addButtons() || attempts > 40) clearInterval(timer);
  }, 100);
})();
</script>

</body>
</html>
